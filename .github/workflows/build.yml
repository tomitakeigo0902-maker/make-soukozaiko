name: Build Windows exe

# main に push したとき（コード本体・依存・静的ファイル・バッチが変わったとき）に
# Windows で exe をビルドして、Releases の「latest」に最新版として置き直す。
# 手動でも実行可能（Actions タブの "Run workflow"）。

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "database.py"
      - "seed.py"
      - "requirements.txt"
      - "static/**"
      - "*.bat"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: ソースを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 必要なライブラリをインストール
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: exe をビルド
        shell: cmd
        run: |
          python -m PyInstaller --noconfirm --onefile --name soukozaiko --add-data "static;static" main.py

      - name: ビルド成果物を確認
        shell: cmd
        run: dir dist

      - name: 「latest」リリースに最新版として上書き公開
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新ビルド
          body: |
            main ブランチの最新コミットから自動ビルドされた Windows 用 exe です。

            サーバー PC で「アプリを更新.bat」を実行すると、この exe を自動で取得して差し替えます。

            初回セットアップ時は、このページから次の3つをまとめてダウンロードしてください：
            - `soukozaiko.exe`
            - `サーバー自動起動を設定.bat`
            - `アプリを更新.bat`
          prerelease: false
          make_latest: "true"
          files: |
            dist/soukozaiko.exe
            サーバー自動起動を設定.bat
            サーバー自動起動を解除.bat
            アプリを更新.bat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
